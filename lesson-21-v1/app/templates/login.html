{% extends "base.html" %}

{% block title %}Log in · InstaLite{% endblock %}

{% block content %}
<main class="page page-narrow">
    <section class="auth-card" aria-labelledby="login-heading">
        <h1 id="login-heading" class="auth-title">Welcome back</h1>
        <p class="auth-hint">Sign in with your username or email.</p>

        <form class="auth-form" action="{{ url_for('main.login') }}" method="post">
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <label class="field">
                <span class="field-label">Username or email</span>
                <input
                    type="text"
                    name="identifier"
                    autocomplete="username"
                    required
                >
            </label>

            <label class="field">
                <span class="field-label">Password</span>
                <input
                    type="password"
                    name="password"
                    autocomplete="current-password"
                    required
                >
            </label>

            <button type="submit" class="btn btn-primary btn-block">Log in</button>
        </form>

        <p class="auth-switch">
            New here?
            <a href="{{ url_for('main.signup') }}">Create an account</a>
        </p>
    </section>
</main>
{% endblock %}
